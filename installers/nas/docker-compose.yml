services:
  kindle-dashboard:
    build:
      context: ../..
      dockerfile: installers/nas/Dockerfile
    container_name: kindle-dashboard
    init: true
    restart: unless-stopped
    ports:
      - "8585:8585"
    volumes:
      - config:/config
      - data:/data
    environment:
      - KINDLE_CONFIG=/config/config.yaml
      - KINDLE_DATA_DIR=/data
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8585/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  config:
  data:
