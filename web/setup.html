<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Dashboard · 设置</title>
<style>
  :root{--bg:#f5f5f4;--card:#fff;--ink:#1c1917;--ink2:#57534e;--ink3:#a8a29e;--line:#e7e5e4;--accent:#1c1917;--ok:#16a34a;--err:#dc2626;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,'Noto Sans CJK SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;}
  header{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;gap:16px;}
  header h1{font-size:18px;margin:0;font-weight:800;}
  header .sec-note{font-size:12px;color:var(--ink3);}
  header .spacer{flex:1;}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:8px 14px;font-weight:600;}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  button:active{transform:translateY(1px);}
  #status{font-size:12px;color:var(--ink2);}
  main{display:grid;grid-template-columns:1fr 420px;gap:24px;padding:24px;max-width:1280px;margin:0 auto;align-items:start;}
  @media(max-width:920px){main{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:18px;}
  .card h2{font-size:15px;margin:0 0 4px;font-weight:800;}
  .card .help{font-size:12px;color:var(--ink3);margin-bottom:14px;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;}
  .field .fhelp{font-size:11px;color:var(--ink3);margin-top:3px;}
  .field input[type=text],.field input[type=password],.field input[type=number],.field select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font:inherit;background:#fafaf9;}
  .field.inline{display:flex;align-items:center;gap:8px;}
  .field.inline label{margin:0;}
  .badge{display:inline-block;font-size:11px;padding:1px 7px;border-radius:6px;background:var(--line);color:var(--ink2);margin-left:6px;}
  .badge.on{background:#dcfce7;color:#15803d;}
  .machine{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px;background:#fafaf9;}
  .machine .row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  .machine .ssh{display:none;}
  .machine.mode-ssh .ssh{display:block;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .chip{font-size:12px;border:1px solid var(--line);border-radius:20px;padding:3px 10px;cursor:pointer;user-select:none;background:#fff;}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .preview{position:sticky;top:78px;}
  .preview .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .preview .tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .preview .frame{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;}
  .preview img{max-width:100%;height:auto;border:1px solid var(--line);border-radius:4px;background:#fff;}
  .preview .ctl{display:flex;gap:8px;align-items:center;margin:10px 0;}
  .secnote{background:#fffbeb;border:1px solid #fde68a;color:#92400e;font-size:12px;border-radius:8px;padding:8px 12px;margin-bottom:14px;}
  .errbox{background:#fef2f2;border:1px solid #fecaca;color:var(--err);font-size:12px;border-radius:8px;padding:8px 12px;margin-bottom:14px;white-space:pre-line;display:none;}
  .add-disc{font-size:12px;color:var(--ink2);margin-top:8px;}
  .add-disc a{color:#2563eb;cursor:pointer;margin-right:10px;}
</style>
</head>
<body>
<header>
  <h1>Kindle Dashboard</h1><span class="sec-note" id="hdr-sec-note">设置</span>
  <span class="spacer"></span>
  <select id="lang-switch" onchange="switchLang(this.value)" style="font:inherit;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:7px 10px;font-weight:600;">
    <option value="zh">中文</option>
    <option value="en">English</option>
  </select>
  <span id="status"></span>
  <button class="primary" id="btn-save" onclick="save()">保存</button>
</header>
<main>
  <div id="forms">
    <div class="secnote" id="hdr-secnote">🔒 你填的天气 Key / HA 令牌 / SSH 账号<b>只存本地</b>(config.yaml),不会上传任何服务器。</div>
    <div class="errbox" id="errbox"></div>
    <div id="form-body"></div>
  </div>
  <div class="preview">
    <div class="card">
      <h2 id="prev-title">实时预览</h2>
      <div class="help" id="prev-help">所见即所得 —— 切风格立即变;改配置点「保存」后刷新。</div>
      <div class="tabs" id="page-tabs"></div>
      <div class="ctl">
        <label id="prev-style-label">风格</label>
        <select id="style-sel" onchange="refreshPreview()" style="flex:1;padding:6px;border-radius:8px;border:1px solid var(--line);"></select>
        <button id="prev-refresh" onclick="refreshPreview()">刷新</button>
      </div>
      <div class="frame"><img id="preview-img" alt="预览"></div>
    </div>
  </div>
</main>

function h(v){
  return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fieldLabel(k){

// 切换语言:只改 server.language,合并进当前 CONFIG 整体保存,然后重载(保留 token)。
async function switchLang(lang){
  if(!CONFIG.server) CONFIG.server={};
  CONFIG.server.language=lang;
  try{
    await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({config:CONFIG})});
  }catch(e){}
  if(new URLSearchParams(location.search).get('token')){
    location.reload();
  }else{
    const tok=sessionStorage.getItem('kd_token');
    location.href = tok ? (location.pathname+'?token='+encodeURIComponent(tok)) : location.href;
    if(!tok) location.reload();
  }
}

// 把静态 <body> 里的中文节点按当前语言重写(zh 保持原字面)。
function applyStaticI18n(){
  document.documentElement.lang=LANG;
  document.title='Kindle Dashboard · '+t('sec_note');
  document.getElementById('hdr-sec-note').textContent=t('sec_note');
  document.getElementById('btn-save').textContent=t('save');
  document.getElementById('hdr-secnote').innerHTML=t('secnote');
  document.getElementById('prev-title').textContent=t('preview');
  document.getElementById('prev-help').textContent=t('preview_help');
  document.getElementById('prev-style-label').textContent=t('prev_style');
  document.getElementById('prev-refresh').textContent=t('refresh');
  document.getElementById('preview-img').alt=t('preview_alt');
  const ls=document.getElementById('lang-switch'); if(ls) ls.value=LANG;
}

async function init(){
  const scR = await fetch('/api/schema');
  if(scR.status===401){   // 没带访问令牌:给明确提示,别把 401 JSON 当 schema 用导致空白/报错
    document.getElementById('form-body').innerHTML =
      '<div class="errbox" style="display:block">'+t('need_token')+'</div>';
    return;
  }
  const [sc, cf, st, dv, su] = await Promise.all([
    scR.json(),
    fetch('/api/config').then(r=>r.json()),
    fetch('/api/styles').then(r=>r.json()),
    fetch('/api/discovered-devices').then(r=>r.json()),
    fetch('/api/server-url').then(r=>r.json()).catch(()=>({recommended:window.location.origin,candidates:[window.location.origin],is_loopback:false})),
  ]);
  SCHEMA=sc; CONFIG=cf.config; STYLES=st.styles; PAGES=st.pages; DISCOVERED=dv.devices; SERVER_URL=su;
  LANG=(CONFIG.server && CONFIG.server.language) || 'zh';
  applyStaticI18n();
  renderForm(); renderPreviewControls(); updateStatus(cf.status);
}

function renderForm(){
  const root=document.getElementById('form-body'); root.innerHTML='';
  for(const sec of SCHEMA){
    const c=document.createElement('div'); c.className='card';
    c.innerHTML=`<h2>${sec.label}<span class="badge" id="badge-${sec.key}"></span></h2>`+
                (sec.help?`<div class="help">${sec.help}</div>`:'');
    if(sec.key==='devices') c.appendChild(renderDevices(sec));
    else if(sec.key==='ha_page') c.appendChild(renderHaEntities(sec));
    else for(const f of sec.fields){ const n=renderField(sec.key,f); if(n) c.appendChild(n); }
    // devices/ha_page 用自定义列表控件,其标量字段(如 devices.interval)在列表后补渲染
    if(sec.key==='devices'||sec.key==='ha_page')
      for(const f of sec.fields){ if(f.type!=='module_list'){ const n=renderField(sec.key,f); if(n) c.appendChild(n); } }
    if(sec.key==='reminders') c.appendChild(renderReminderCmd());
    if(sec.key==='mstodo') c.appendChild(renderMstodo());
    root.appendChild(c);
  }
  wireKindleModel();
}

// 机型下拉 ↔ 自定义宽高联动:选具体机型→自动回填横屏分辨率并锁定输入;选「自定义」→可手填。
// 映射表唯一数据源 = schema 的 kindle_model.options(每项 [value,label,w,h]),不在前端复制。
function wireKindleModel(){
  const sel=document.getElementById('f-server-kindle_model');
  const wEl=document.getElementById('f-server-render_width');
  const hEl=document.getElementById('f-server-render_height');
  if(!sel||!wEl||!hEl) return;
  const srv=(SCHEMA.find(s=>s.key==='server')||{}).fields||[];
  const opts=(srv.find(f=>f.key==='kindle_model')||{}).options||[];
  function apply(){
    const m=opts.find(o=>o[0]===sel.value);
    const custom=(sel.value==='custom');
    if(m && !custom){ wEl.value=m[2]; hEl.value=m[3]; }
    wEl.readOnly=hEl.readOnly=!custom;
    wEl.style.opacity=hEl.style.opacity=custom?'1':'0.55';
  }
  sel.addEventListener('change',apply);
  apply();
}

function renderField(sk,f){
  if(f.hidden) return null;   // 由配套控件维护(如城市名由城市选择器写入隐藏 input)
  const v=(CONFIG[sk]||{})[f.key];
  const d=document.createElement('div'); d.className='field'; const id=`f-${sk}-${f.key}`;
  const help=f.help?`<div class="fhelp">${f.help}</div>`:'';
  if(f.type==='city'){ return cityField(sk,f,v,help); }
  if(f.type==='printer'){ return printerField(sk,f,v,help); }
  if(sk==='display'&&f.key==='pages'){ return choiceListField(sk,f,v,help,PAGES,pageLabel,t('empty_pages')); }
  if(sk==='display'&&f.key==='style'){ return styleField(sk,f,v,help); }
  if(sk==='display'&&f.key==='style_rotation'){ return choiceListField(sk,f,v,help,STYLES,styleLabel,t('empty_styles')); }
  if(f.type==='bool'){
    d.className='field inline';
    d.innerHTML=`<input type="checkbox" id="${id}" ${v?'checked':''}><label for="${id}">${f.label}</label>`+help;
  }else if(f.type==='enum'){
    const opts=(f.options||[]).map(o=>`<option value="${h(o[0])}" ${v===o[0]?'selected':''}>${h(o[1])}</option>`).join('');
    d.innerHTML=`<label>${f.label}</label><select id="${id}">${opts}</select>`+help;
  }else if(f.type==='int'||f.type==='float'){
    d.innerHTML=`<label>${f.label}</label><input type="number" id="${id}" value="${h(v??'')}" step="${f.type==='float'?'0.1':'1'}">`+help;
  }else if(f.type==='str_list'){
    d.innerHTML=`<label>${f.label}</label><input type="text" id="${id}" value="${h((v||[]).join(', '))}" placeholder="${h(t('ph_comma'))}">`+help;
  }else if(f.secret){
    d.innerHTML=`<label>${f.label} 🔑</label><input type="password" id="${id}" value="${v===MASK?MASK:''}" placeholder="${v===MASK?h(t('ph_saved')):''}">`+help;
  }else{
    d.innerHTML=`<label>${f.label}</label><input type="text" id="${id}" value="${h(v??'')}">`+help;
  }
  return d;
}

function styleField(sk,f,v,help){

  const opts=STYLES.map(s=>`<option value="${h(s)}" ${v===s?'selected':''}>${h(styleLabel(s))}</option>`).join('');
  d.innerHTML=`<label>${f.label}</label><select id="f-${sk}-${f.key}">${opts}</select>`+help;
  return d;
}

function choiceListField(sk,f,v,help,choices,labelFn,emptyText){
  const d=document.createElement('div'); d.className='field';
  const sel=new Set(Array.isArray(v)?v:[]);
  const chips=choices.map(k=>`<span class="chip ${sel.has(k)?'on':''}" data-v="${h(k)}">${h(labelFn(k))}</span>`).join('');
  d.innerHTML=`<label>${f.label}</label><input type="hidden" id="f-${sk}-${f.key}" value="${h([...sel].join(', '))}">
    <div class="chips">${chips}</div>
    <div class="fhelp choice-empty">${h(sel.size?t('selected_n')(sel.size):emptyText)}</div>`+help;
  const hid=d.querySelector(`#f-${sk}-${f.key}`);
  const note=d.querySelector('.choice-empty');
  function sync(){
    const vals=[...d.querySelectorAll('.chip.on')].map(c=>c.dataset.v);
    hid.value=vals.join(', ');
    note.textContent=vals.length?t('selected_n')(vals.length):emptyText;
  }
  d.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{ c.classList.toggle('on'); sync(); });
  return d;
}

// 打印机选择器:从 Home Assistant 扫描候选打印机,选中后保存其公共实体前缀。
function printerField(sk,f,v,help){
  const d=document.createElement('div'); d.className='field';
  d.innerHTML=`<label>${f.label}</label>
    <div style="display:flex;gap:6px;">
      <select class="printer-sel" style="flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fafaf9;">
        <option value="${h(v||'')}">${h(v?(t('printer_current')+v):t('printer_scan_first'))}</option>
      </select>
      <button type="button" class="printer-scan" style="white-space:nowrap;">${h(t('printer_scan'))}</button>
    </div>
    <input type="hidden" id="f-${sk}-${f.key}" value="${h(v||'')}">
    <details style="margin-top:6px;"><summary style="font-size:12px;color:var(--ink3);cursor:pointer;">${h(t('printer_adv'))}</summary>
      <input type="text" class="printer-prefix" value="${h(v||'')}" placeholder="${h(t('printer_prefix_ph'))}" style="margin-top:5px;"></details>
    <div class="printer-results" style="margin-top:4px;"></div>`+help;
  const sel=d.querySelector('.printer-sel'), scan=d.querySelector('.printer-scan'),
        hid=d.querySelector(`#f-${sk}-${f.key}`), prefix=d.querySelector('.printer-prefix'),
        box=d.querySelector('.printer-results');
  function setVal(val){
    hid.value=val; prefix.value=val;
  }
  function label(p){
    const bits=[p.name||p.prefix, p.online?t('online'):t('offline')];
    if(p.status) bits.push(p.status);
    if(p.nozzle) bits.push(t('nozzle')+p.nozzle+'°');
    if(p.bed) bits.push(t('bed')+p.bed+'°');
    return bits.join(' · ');
  }
  async function doScan(){
    box.innerHTML=`<div class="aux" style="font-size:12px;">${h(t('printer_scanning'))}</div>`;
    let j; try{ j=await fetch('/api/printers').then(r=>r.json()); }
    catch(err){ box.innerHTML=`<div class="aux" style="font-size:12px;color:#b00;">${h(t('net_err'))}</div>`; return; }
    if(!j.ok){ box.innerHTML=`<div class="aux" style="font-size:12px;color:#b00;">${h(j.error||t('printer_scan_fail'))}</div>`; return; }
    if(!j.printers.length){ box.innerHTML=`<div class="aux" style="font-size:12px;">${h(t('printer_none'))}</div>`; return; }
    sel.innerHTML=j.printers.map(p=>`<option value="${h(p.prefix)}" ${p.prefix===hid.value?'selected':''}>${h(label(p))}</option>`).join('');
    if(!hid.value || !j.printers.some(p=>p.prefix===hid.value)) setVal(j.printers[0].prefix);
    sel.value=hid.value;
    box.innerHTML=`<div class="aux" style="font-size:12px;color:var(--ink3);">${h(t('printer_found')(j.printers.length))}</div>`;
  }
  sel.onchange=()=>setVal(sel.value);
  scan.onclick=doScan;
  prefix.addEventListener('input',()=>{ hid.value=prefix.value.trim(); });
  return d;
}

// Microsoft To Do:设备码登录。点【连接】→ 显示 code+网址 → 轮询 → 已连接显示账号+断开。
// 用户不需要任何 API/密钥,只用自己的微软账号登录授权一次(详见 docs/mstodo-integration.md)。
function renderMstodo(){
  const wrap=document.createElement('div'); wrap.className='field';
  let poll=null;
  function render(st){
    if(poll){ clearInterval(poll); poll=null; }
    if(st&&st.connected){
      wrap.innerHTML=`<div class="fhelp" style="margin-bottom:8px;">${h(t('mst_connected'))}${st.account?((LANG==='en'?': <b>':':<b>')+h(st.account)+'</b>'):''}</div>
        <button type="button" class="mst-disc">${h(t('mst_disconnect'))}</button>`;
      wrap.querySelector('.mst-disc').onclick=async()=>{
        await fetch('/api/mstodo/logout',{method:'POST'});
        const cf=await fetch('/api/config').then(r=>r.json()); CONFIG=cf.config; updateStatus(cf.status);
        render({connected:false});
      };
    }else{
      wrap.innerHTML=`<div class="fhelp" style="margin-bottom:8px;">${h(t('mst_not_connected'))}</div>
        <button type="button" class="mst-conn primary">${h(t('mst_connect'))}</button>
        <div class="mst-flow" style="margin-top:10px;"></div>`;
      wrap.querySelector('.mst-conn').onclick=startLogin;
    }
  }
  async function startLogin(){
    const flow=wrap.querySelector('.mst-flow');
    flow.innerHTML=`<div class="fhelp">${h(t('mst_requesting'))}</div>`;
    let j; try{ j=await fetch('/api/mstodo/login/start',{method:'POST'}).then(r=>r.json()); }
    catch(e){ flow.innerHTML=`<div class="fhelp" style="color:#dc2626;">${h(t('mst_net_retry'))}</div>`; return; }
    if(!j.ok){ flow.innerHTML=`<div class="fhelp" style="color:#dc2626;">${h(j.error||t('mst_start_fail'))}</div>`; return; }
    flow.innerHTML=`<div style="background:#f4f4f4;border-radius:8px;padding:10px 12px;">
        <div class="fhelp" style="margin-bottom:6px;">${h(t('mst_step1a'))}<a href="${h(j.verification_uri)}" target="_blank">${h(j.verification_uri)}</a></div>
        <div class="fhelp" style="margin-bottom:6px;">${h(t('mst_step2'))}
          <code class="mst-code" style="user-select:all;font-size:14px;background:#fff;padding:2px 8px;border-radius:5px;cursor:pointer;">${h(j.user_code)}</code></div>
        <div class="fhelp">${h(t('mst_step3'))}</div>
        <div class="fhelp mst-wait" style="margin-top:6px;color:#2563eb;">${h(t('mst_waiting'))}</div>
      </div>`;
    const codeEl=flow.querySelector('.mst-code');
    codeEl.onclick=()=>{ navigator.clipboard&&navigator.clipboard.writeText(j.user_code); codeEl.textContent=j.user_code+' ✓'; };
    const sid=j.session, every=Math.max(2,(j.interval||5))*1000;
    poll=setInterval(async()=>{
      let s; try{ s=await fetch('/api/mstodo/login/status?session='+encodeURIComponent(sid)).then(r=>r.json()); }catch(e){ return; }
      if(s.state==='success'){
        const cf=await fetch('/api/config').then(r=>r.json()); CONFIG=cf.config; updateStatus(cf.status);
        render({connected:true,account:s.account});
      }else if(s.state==='error'||s.state==='expired'){
        if(poll){ clearInterval(poll); poll=null; }
        flow.querySelector('.mst-wait').innerHTML=`<span style="color:#dc2626;">${h(s.state==='expired'?t('mst_expired'):(t('mst_login_fail')+(s.error||'')))}</span>`;
      }
    },every);
  }
  fetch('/api/mstodo/state').then(r=>r.json()).then(render).catch(()=>render({connected:false}));
  return wrap;
}

    curName.textContent=name||t('city_unselected'); curId.textContent=id?('· '+id):''; box.innerHTML=''; }
  async function doSearch(){
    const text=q.value.trim(); if(!text){ box.innerHTML=''; return; }
    box.innerHTML=`<div class="aux" style="font-size:12px;">${h(t('city_searching'))}</div>`;

    if(!j.ok){ box.innerHTML=`<div class="aux" style="font-size:12px;color:#b00;">${h(j.error||t('city_search_fail'))}</div>`; return; }

// 远程机器「推」模式:展示一行命令,用户复制到那台机器(NAS/Linux/Mac)上运行即可装上 agent。
// 若设置页从 127.0.0.1/localhost 打开,命令里的看板地址用服务端探测到的局域网地址。
function normalizeBaseUrl(v){
  let s=String(v||'').trim().replace(/\/+$/,'');
  if(s && !/^https?:\/\//i.test(s)) s='http://'+s;
  return s;
}
function pushCmds(base){
  const u=normalizeBaseUrl(base||window.location.origin);
  const ps=u.replace(/'/g,"''");
  return {
    nix:`curl -fsSL ${u}/agent/install.sh | sh -s -- ${u} 30`,
    win:`$u='${ps}'; iwr "$u/agent/install.ps1" -UseBasicParsing -OutFile "$env:TEMP\\kda.ps1"; powershell -NoProfile -ExecutionPolicy Bypass -File "$env:TEMP\\kda.ps1" $u 30`
  };
}
function updatePushCmds(){
  const u=document.getElementById('push-url');
  const nix=document.getElementById('push-nix');
  const win=document.getElementById('push-win');
  if(!u||!nix||!win) return;
  const c=pushCmds(u.value);
  nix.value=c.nix; win.value=c.win;
}
function pushAgentBox(){
  const origin=window.location.origin;
  const recommended=normalizeBaseUrl((SERVER_URL&&SERVER_URL.recommended)||origin);
  const urls=[];
  for(const u of [recommended, ...((SERVER_URL&&SERVER_URL.candidates)||[])]){ const x=normalizeBaseUrl(u); if(x&&!urls.includes(x)) urls.push(x); }
  const choices=urls.length>1
    ? `<select onchange="document.getElementById('push-url').value=this.value;updatePushCmds();" style="width:100%;margin-top:5px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fafaf9;">${urls.map(u=>`<option value="${h(u)}"${u===recommended?' selected':''}>${h(u)}</option>`).join('')}</select>`
    : '';
  const hint=(SERVER_URL&&SERVER_URL.is_loopback&&recommended!==origin)
    ? (t('push_url_prefix')(h(origin))+t('push_url_replaced'))
    : t('push_url_reachable');
  const row=id=>`<div style="display:flex;gap:6px;align-items:stretch;margin-top:5px;">
      <input type="text" readonly value="" id="${id}"
             style="flex:1;font:12px monospace;padding:8px;border:1px solid var(--line);border-radius:6px;background:#fafaf9;">
      <button type="button" onclick="copyCmd('${id}', event)" style="white-space:nowrap;">${h(t('push_copy'))}</button></div>`;
  const d=document.createElement('div');
  d.style.cssText='margin-top:14px;border-top:1px dashed var(--line);padding-top:12px;';
  d.innerHTML=`<div class="fhelp" style="margin-bottom:4px;">${t('push_intro')}</div>
    <div class="fhelp" style="margin-top:8px;">${t('push_addr_label')}${hint}</div>
    ${choices}
    <input type="text" id="push-url" value="${h(recommended)}" oninput="updatePushCmds()"
           style="width:100%;margin-top:5px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fafaf9;font:12px monospace;">
    <div class="fhelp" style="margin-top:8px;">${t('push_nix_label')}</div>${row('push-nix')}
    <div class="fhelp" style="margin-top:8px;">${t('push_win_label')}</div>${row('push-win')}
    <div class="fhelp" style="margin-top:6px;">${t('push_uninstall')}</div>`;
  setTimeout(updatePushCmds,0);
  return d;
}
function copyCmd(id, ev){
  const el=document.getElementById(id); el.select();
  const btn=ev&&ev.currentTarget;
  const done=()=>{ if(!btn) return; const prev=btn.textContent; btn.textContent=t('push_copied'); setTimeout(()=>btn.textContent=prev,1200); };
  navigator.clipboard?.writeText(el.value).then(done).catch(()=>{ document.execCommand('copy'); done(); });
}

const BASE_DEVICE_FIELDS=['cpu','mem','net','disk_io'];
function uniq(arr){
  const out=[];
  for(const x of arr){ if(x&&!out.includes(x)) out.push(x); }
  return out;
}
function deviceDiscoveryFor(m){
  const id=String(m.id||'').trim();
  const name=String(m.name||'').trim();
  let hit=DISCOVERED.find(d=>[d.key,d.hostname].includes(id) || [d.key,d.hostname].includes(name));
  if(!hit && (m.mode||'local')==='local'){
    const locals=DISCOVERED.filter(d=>!d.updated_at);
    if(locals.length===1) hit=locals[0];
  }
  return hit;
}
function machineFieldOptions(m){
  const hit=deviceDiscoveryFor(m);
  return uniq([...BASE_DEVICE_FIELDS, ...((hit&&hit.fields)||[]), ...((m.fields)||[])]);
}

function machineCard(m,idx){
  const card=document.createElement('div'); card.className='machine mode-'+(m.mode||'local');
  card.dataset.idx=idx;
  const fieldsFor = machineFieldOptions(m);
  const sel=new Set(m.fields||[]); // 空=全显示,因此不预选任何 chip
  const chips=fieldsFor.map(fk=>`<span class="chip ${sel.has(fk)?'on':''}" data-f="${h(fk)}" onclick="this.classList.toggle('on')">${h(fieldLabel(fk))}</span>`).join('');
  card.innerHTML=`
    <div class="row">
      <div class="field"><label>${h(t('dev_name'))}</label><input type="text" class="m-name" value="${h(m.name||'')}"></div>
      <div class="field"><label>${h(t('dev_mode'))}</label><select class="m-mode" onchange="this.closest('.machine').className='machine mode-'+this.value">
        <option value="local" ${m.mode==='local'?'selected':''}>${h(t('dev_mode_local'))}</option>
        <option value="push" ${m.mode==='push'?'selected':''}>${h(t('dev_mode_push'))}</option>
        <option value="ssh" ${m.mode==='ssh'?'selected':''}>${h(t('dev_mode_ssh'))}</option></select></div>
    </div>
    <div class="row">
      <div class="field"><label>${h(t('dev_platform'))}</label><select class="m-platform">
        ${['auto','linux','macos','windows'].map(p=>`<option ${m.platform===p?'selected':''}>${p}</option>`).join('')}</select></div>
      <div class="field"><label>${h(t('dev_id'))}</label><input type="text" class="m-id" value="${h(m.id||'')}" placeholder="${h(t('dev_id_ph'))}"></div>
    </div>
    <div class="ssh">
      <div class="row">
        <div class="field"><label>${h(t('dev_host'))}</label><input type="text" class="m-host" value="${h(m.host||'')}"></div>
        <div class="field"><label>${h(t('dev_ssh_port'))}</label><input type="number" class="m-port" value="${m.ssh_port||22}"></div>
      </div>
      <div class="row">
        <div class="field"><label>${h(t('dev_ssh_user'))}</label><input type="text" class="m-user" value="${h(m.ssh_user||'')}"></div>
        <div class="field"><label>${h(t('dev_ssh_pw'))} 🔑</label><input type="password" class="m-pw" placeholder="${m.ssh_password===MASK?h(t('ph_saved')):''}" value="${m.ssh_password===MASK?MASK:''}"></div>
      </div>
    </div>
    <label style="font-size:12px;font-weight:600;">${h(t('dev_show_items'))}</label>
    <div class="chips">${chips}</div>
    <div style="text-align:right;margin-top:8px;"><button onclick="this.closest('.machine').remove()" style="font-size:12px;padding:4px 10px;">${h(t('dev_delete'))}</button></div>`;
  return card;
}

function addDiscovered(d){
  const wrap=document.getElementById('machines');
  const card=machineCard({name:d.hostname,id:d.key,mode:'push',platform:'auto',fields:[]}, 'd'+d.key);
  wrap.insertBefore(card, wrap.querySelector('.add-disc'));
}

// ---- 智能家居(HA 实体卡片)----
const HA_DOMAINS=['','light','switch','sensor','binary_sensor','lock','cover','climate','fan','media_player','person','automation'];
function renderHaEntities(sec){
  const wrap=document.createElement('div'); wrap.id='ha-entities';
  const list=(CONFIG.ha_page&&CONFIG.ha_page.entities)||[];
  list.forEach((e,i)=>wrap.appendChild(entityCard(e,i)));
  const add=document.createElement('button'); add.textContent=t('ha_add');
  add.onclick=()=>{ wrap.insertBefore(entityCard({entity_id:'',name:'',icon:''}, 'n'+Math.random()), add); };
  wrap.appendChild(add);
  return wrap;
}

// 实体选择器(仿城市选择器):搜实体名 → /api/ha-entities 候选 → 选中写 entity_id;高级可手填图标。
function entityCard(e, idx){
  const card=document.createElement('div'); card.className='haent machine'; card.dataset.idx=idx;
  const domOpts=HA_DOMAINS.map(d=>`<option value="${d}">${d||t('ha_all_types')}</option>`).join('');
  card.innerHTML=`
    <input type="hidden" class="he-id" value="${h(e.entity_id||'')}">
    <div style="display:flex;gap:6px;">
      <input type="text" class="he-q" placeholder="${h(t('ha_q_ph'))}" style="flex:1">
      <select class="he-domain" style="width:108px;flex-shrink:0;padding:8px;border-radius:8px;border:1px solid var(--line);background:#fafaf9;">${domOpts}</select>
      <button type="button" class="he-go" style="white-space:nowrap;">${h(t('ha_search'))}</button>
    </div>
    <div style="font-size:12px;margin-top:5px;">${h(t('ha_current'))}<b class="he-cur-id">${h(e.entity_id||t('city_unselected'))}</b></div>
    <div class="he-results" style="margin-top:4px;"></div>
    <div class="field" style="margin-top:8px;"><label>${h(t('ha_disp_name'))}</label><input type="text" class="he-name" value="${h(e.name||'')}" placeholder="${h(t('ha_name_ph'))}"></div>
    <details style="margin-top:2px;"><summary style="font-size:12px;color:var(--ink3);cursor:pointer;">${h(t('ha_icon_adv'))}</summary>
      <input type="text" class="he-icon" value="${h(e.icon||'')}" placeholder="${h(t('ha_icon_ph'))}" style="margin-top:5px;"></details>
    <div style="text-align:right;margin-top:8px;"><button onclick="this.closest('.haent').remove()" style="font-size:12px;padding:4px 10px;">${h(t('dev_delete'))}</button></div>`;
  const q=card.querySelector('.he-q'), go=card.querySelector('.he-go'),
        dom=card.querySelector('.he-domain'), box=card.querySelector('.he-results'),
        hid=card.querySelector('.he-id'), curId=card.querySelector('.he-cur-id'),
        nameI=card.querySelector('.he-name'), iconI=card.querySelector('.he-icon');
  function pick(ent){
    hid.value=ent.entity_id; curId.textContent=ent.entity_id;
    nameI.placeholder=ent.name||t('ha_name_ph');
    if(!iconI.value.trim()&&ent.icon) iconI.value=ent.icon;
    box.innerHTML='';
  }
  async function doSearch(){
    box.innerHTML=`<div class="aux" style="font-size:12px;">${h(t('city_searching'))}</div>`;
    let j; try{ j=await fetch('/api/ha-entities?q='+encodeURIComponent(q.value.trim())+'&domain='+encodeURIComponent(dom.value)).then(r=>r.json()); }
    catch(err){ box.innerHTML=`<div class="aux" style="font-size:12px;color:#b00;">${h(t('net_err'))}</div>`; return; }
    if(!j.ok){ box.innerHTML=`<div class="aux" style="font-size:12px;color:#b00;">${h(j.error||t('ha_read_fail'))}</div>`; return; }
    if(!j.entities.length){ box.innerHTML=`<div class="aux" style="font-size:12px;">${h(t('ha_no_match'))}</div>`; return; }
    box.innerHTML = j.truncated ? `<div class="aux" style="font-size:11px;color:var(--ink3);margin-bottom:3px;">${h(t('ha_truncated'))}</div>` : '';
    j.entities.forEach(ent=>{
      const b=document.createElement('button'); b.type='button';
      b.style.cssText='display:block;width:100%;text-align:left;padding:6px 8px;margin-top:3px;border:1px solid var(--line);border-radius:6px;background:#fafaf9;cursor:pointer;font:inherit;';
      b.innerHTML=`<b>${h(ent.name)}</b> <span class="aux" style="font-size:11px;">${h(ent.entity_id)} · ${h(ent.domain)}${ent.state?(' · '+h(ent.state)):''}</span>`;
      b.onclick=()=>pick(ent); box.appendChild(b);
    });
  }
  go.onclick=doSearch;
  q.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ ev.preventDefault(); doSearch(); } });
  return card;
}

// ---- 收集表单 ----
function collect(){
  const out={};
  for(const sec of SCHEMA){
    if(sec.key==='devices'||sec.key==='ha_page') continue;
    out[sec.key]={};
    for(const f of sec.fields){
      const el=document.getElementById(`f-${sec.key}-${f.key}`); if(!el) continue;
      if(f.type==='bool') out[sec.key][f.key]=el.checked;
      else if(f.type==='int') out[sec.key][f.key]=parseInt(el.value||'0',10);
      else if(f.type==='float') out[sec.key][f.key]=parseFloat(el.value||'0');
      else if(f.type==='str_list') out[sec.key][f.key]=el.value.split(',').map(s=>s.trim()).filter(Boolean);
      else if(f.secret){ if(el.value&&el.value!==MASK) out[sec.key][f.key]=el.value; }
      else out[sec.key][f.key]=el.value;
    }
  }
  // 设备
  out.devices={machines:[]};
  document.querySelectorAll('#machines .machine').forEach(card=>{
    const g=s=>card.querySelector(s);
    const fields=[...card.querySelectorAll('.chip.on')].map(c=>c.dataset.f);
    const m={
      name:g('.m-name').value, id:g('.m-id').value, mode:g('.m-mode').value,
      platform:g('.m-platform').value, host:g('.m-host').value,
      ssh_user:g('.m-user').value, ssh_port:parseInt(g('.m-port').value||'22',10),
      // 不勾任何项才存空(=全显示);只要勾了,就严格按勾选项显示。
      fields: fields.length===0?[]:fields,
    };
    const pw=g('.m-pw').value; if(pw&&pw!==MASK) m.ssh_password=pw;
    if(m.name.trim()) out.devices.machines.push(m);
  });
  // 智能家居:每张卡片一个实体(没选 entity_id 的空卡片跳过)
  out.ha_page={entities:[]};
  document.querySelectorAll('#ha-entities .haent').forEach(card=>{
    const eid=card.querySelector('.he-id').value.trim();
    if(!eid) return;
    out.ha_page.entities.push({
      entity_id:eid,
      name:card.querySelector('.he-name').value.trim(),
      icon:card.querySelector('.he-icon').value.trim(),
    });
  });
  // devices/ha_page 段的标量字段(如 devices.interval)—— 列表控件没收集,这里补
  for(const sec of SCHEMA){
    if(sec.key!=='devices' && sec.key!=='ha_page') continue;
    for(const f of sec.fields){
      if(f.type==='module_list') continue;
      const el=document.getElementById(`f-${sec.key}-${f.key}`); if(!el) continue;
      out[sec.key][f.key] = f.type==='int' ? parseInt(el.value||'0',10)
                          : f.type==='bool' ? el.checked : el.value;
    }
  }
  return out;
}

async function save(){
  const r=await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({config:collect()})});
  const j=await r.json(); const eb=document.getElementById('errbox');
  if(!j.ok){ eb.style.display='block'; eb.textContent=t('save_fail')+'\n'+j.errors.join('\n'); return; }
  eb.style.display='none';
  const cf=await fetch('/api/config').then(r=>r.json()); CONFIG=cf.config;
  DISCOVERED=(await fetch('/api/discovered-devices').then(r=>r.json())).devices;
  renderForm(); updateStatus(j.status); refreshPreview();
  document.getElementById('status').textContent=t('saved_at')(new Date().toLocaleTimeString());
}

function updateStatus(st){
  if(!st) return;
  for(const sec of SCHEMA){
    const b=document.getElementById('badge-'+sec.key); if(!b) continue;
    const on=st.enabled&&st.enabled[sec.key];
    b.textContent=on?t('enabled'):t('disabled'); b.className='badge '+(on?'on':'');
  }
}

// ---- 预览 ----
function renderPreviewControls(){
  const tabs=document.getElementById('page-tabs'); tabs.innerHTML='';
  PAGES.forEach(p=>{const b=document.createElement('button');b.textContent=pageLabel(p);b.title=p;b.onclick=()=>{curPage=p;markTabs();refreshPreview();};b.dataset.p=p;tabs.appendChild(b);});
  const sel=document.getElementById('style-sel');
  sel.innerHTML=STYLES.map(s=>`<option value="${h(s)}">${h(styleLabel(s))}</option>`).join('');
  const preferred=(CONFIG.display||{}).style;
  if(STYLES.includes(preferred)) sel.value=preferred;
  markTabs(); refreshPreview();
}
function markTabs(){document.querySelectorAll('#page-tabs button').forEach(b=>b.className=b.dataset.p===curPage?'on':'');}
function refreshPreview(){
  const style=document.getElementById('style-sel').value;
  const img=document.getElementById('preview-img');
  const base=`/kindle/preview.png?page=${curPage}&style=${style}&token=${encodeURIComponent(KD_TOKEN)}`;
  img.style.opacity='0.35';   // 渲染中变淡,出图后恢复
  let tries=0;
  (function load(){
    tries++;
    const probe=new Image();
    probe.onload=()=>{ img.src=probe.src; img.style.opacity='1'; };
    // 渲染串行化下偶发的超时/被占用 → 自动重试(最多 3 次,间隔递增),不再裂图
    probe.onerror=()=>{ if(tries<3){ setTimeout(load, 1200*tries); } else { img.style.opacity='1'; } };
    probe.src=`${base}&t=${Date.now()}&try=${tries}`;
  })();
}

init();
</script>
