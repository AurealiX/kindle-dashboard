# ============================================================
# Kindle Dashboard configuration example
# ============================================================
# Usage: copy this file to config.yaml and edit as needed.
#   cp config.example.yaml config.yaml
#
# config.yaml holds your secrets; it's excluded by .gitignore — stored locally only, never uploaded.
# Most people find it easier to use the settings web page (:port/setup) instead of editing this by hand.
#
# "Config = pages": fill in a module's key fields and its page shows; leave them blank and it auto-hides.
# The single source of truth for field definitions: server/config/schema.py
# ============================================================

server:
  language: zh              # UI / dashboard language: zh Chinese / en English (en hides lunar calendar, solar terms, zodiac, etc.)
  port: 8585
  timezone: Asia/Shanghai
  page_interval: 20          # how many seconds between page flips on the Kindle
  kindle_model: base         # Kindle model: base/pw34/pw5/pw12/scribe/custom (renders at the model's native resolution, no blur)
  render_width: 800          # only used when kindle_model=custom (landscape resolution = portrait width/height swapped)
  render_height: 600
  render_rotate: 270         # rotate after rendering to write the e-ink screen in portrait (270=clockwise, default; 90=counter-clockwise; 0=none)
  render_grayscale: true
  render_interval: 30        # how often to re-render the dashboard image (seconds; refreshes the clock and changed data, decoupled from collection)
  access_token: ""           # settings-page access token; auto-generated by the installer / on first start (blank = no auth, not recommended)

# Weather (QWeather) — the weather page shows only if key+location are filled
# Recommended via the settings page: fill in host/key and save, then search a city name to pick it — the code is matched and the city name is filled automatically.
weather:
  provider: qweather
  host: ""                   # the dedicated domain QWeather assigns in its console: xxx.re.qweatherapi.com
  key: ""                    # API Key (secret)
  location: "101010100"      # city LocationID (Beijing example); use the settings page to search a city and auto-fill
  location_name: ""          # city display name (used in the weather title); auto-filled when you pick a city in the settings page, reverse-looked-up if blank
  interval: 600              # collection interval (seconds); weather changes slowly, recommend >=600 (also saves API quota)

# Reminders (Apple) — needs a Mac running the collection script to push; see install docs
reminders:
  enabled: false
  interval: 300              # report interval (seconds); launchd timer, re-run enable_reminders.sh after changing

# Microsoft To Do (optional) — click [Connect] in the settings page to sign in with your Microsoft account; merged with Apple Reminders for display
mstodo:
  enabled: false             # written by the login endpoint, don't edit by hand
  client_id: "14d82eec-204b-4c2f-b7e8-296a70dab67e"   # built-in public client; swap in your own Azure app if you have one
  include_flagged_emails: false   # whether to include the Outlook "flagged emails" list
  interval: 600              # collection interval (seconds); to-dos change slowly, recommend >=600

# AI usage (Claude / Codex) — reads ccusage locally, no middleware
# Choosing "enable AI usage" at install time auto-detects/installs Node + ccusage and sets enabled to true
ai_usage:
  enabled: false
  claude_rate: 1.0           # Claude official price x multiplier = custom cost, default 1.0
  codex_rate: 1.0            # Codex official price x multiplier, default 1.0; the custom price is hidden when both are 1
  interval: 300              # local ccusage collection interval (seconds); parsing logs takes ~10s, recommend >=300
  codex_quota_interval: 600  # Codex quota report (seconds); launchd timer, re-run enable_quota.sh after changing
  claude_quota_interval: 300 # Claude quota report throttle (seconds); pushed via statusLine
  codex_proxy: ""            # proxy for Codex quota collection, e.g. http://127.0.0.1:7897; blank = direct

# Home Assistant — fill in address + token so device pages (e.g. printer) can pull data
home_assistant:
  url: ""                    # http://192.168.x.x:8123
  token: ""                  # long-lived access token (secret)
  interval: 60               # collection interval (seconds); pulls HA entity states (shared by printer/device pages)

# 3D printer (pulled via HA; configure HA above first)
printer:
  enabled: false
  entity_prefix: ""          # the settings page can auto-scan and select; or fill manually, e.g. a1_03919c451100824

# Smart-home entity wall (via Home Assistant) — this page shows only if you select entities
# Recommended: search and add entities in the settings page; manual example (uncomment into entities):
ha_page:
  entities: []
  #   - entity_id: light.living_room
  #     name: Living Room Light   # blank = use HA friendly name
  #     icon: ""                  # blank = use HA's own icon

# Device monitoring — monitored machines can be Windows/Linux/Mac. Local read; each remote picks one of push/pull
# platform: auto/linux/macos/windows — the collection script branches on it; local/push can self-detect, ssh should be set explicitly
devices:
  machines: []
  interval: 30               # server-side collection interval (seconds; local read / SSH pull). The report interval for push devices is set by the target machine's agent
  # Example (uncomment into machines):
  #   - name: This Mac
  #     mode: local           # local read, no agent and no SSH
  #     platform: auto
  #   - name: NAS
  #     mode: push            # target machine runs an agent and reports, no password shared; Windows-friendly
  #     platform: linux
  #     host: 192.168.x.x
  #   - name: Old server
  #     mode: ssh             # server SSHes in and reads, zero install on the target
  #     platform: linux
  #     host: 192.168.x.x
  #     ssh_user: user
  #     ssh_port: 22
  #     ssh_password: ""      # stored locally only

# Pages & styles
display:
  pages: []                  # blank = auto-enable by configured data sources; or list explicitly [home, ai, device]
  style_mode: fixed          # fixed = one fixed set; daily_random = random each day
  style: style_a
  style_rotation: [style_a]  # pool to pick from when daily_random
# Note: each data source's collection interval lives in its own config section's interval field (see above), no longer centralized here.
